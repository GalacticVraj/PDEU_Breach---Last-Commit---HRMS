version: "3.9"

services:
  db:
    image: ankane/pgvector:latest
    container_name: talentos-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: talentos
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  redis:
    image: redis:alpine
    container_name: talentos-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build: 
      context: ./server
      dockerfile: Dockerfile
    container_name: talentos-server
    command: npm run start
    volumes:
      - ./server:/app
      - /app/node_modules
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:password@db:5432/talentos
      - REDIS_URL=redis://redis:6379
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - GMAIL_CLIENT_ID=${GMAIL_CLIENT_ID}
      - GMAIL_CLIENT_SECRET=${GMAIL_CLIENT_SECRET}
      - JWT_SECRET=${JWT_SECRET:-secret}
      - HRMS_API_KEY=${HRMS_API_KEY}
    depends_on:
      - db
      - redis

  frontend:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: talentos-client
    command: npm run dev -- --host 0.0.0.0 --port 3000
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:5000/api
    depends_on:
      - backend

volumes:
  pgdata:
